        <style>
.light {
  width:70px;
  height:70px;
  border-radius:50%;
  background:#220000;
}
.light.on {
  background:red;
  box-shadow:0 0 30px red;
}
.light.off {
  background:#111;
}
</style>
        <script>
const lights = document.querySelectorAll('.light');
const audio = document.getElementById('audio');
audio.src = "https://cdn.prod.website-files.com/69c14009eb714f591aa25c9f/69ce49eb7d40a3194db9d5a9_LIGHTS%20OUT%20SOUNDD.mp3";
let startTime = 0;
let ready = false;
let running = false;
// EXACT timing (your audio)
const cuePoints = [0,1,2,3,4];
const lightsOutPoint = 4.25;
function resetLights(){
  lights.forEach(l=>l.classList.remove('on','off'));
}
function syncLights(){
  if(!running) return;
  const t = audio.currentTime;
  cuePoints.forEach((cp, i) => {
    if(t >= cp && !lights[i].classList.contains('on')){
      lights[i].classList.add('on');
    }
  });
  if(t >= lightsOutPoint && !ready){
    lights.forEach(l=>{
      l.classList.remove('on');
      l.classList.add('off');
    });
    startTime = performance.now();
    ready = true;
  }
  requestAnimationFrame(syncLights);
}
function startGame(){
  if(running) return;
  running = true;
  ready = false;
  resetLights();
  document.getElementById('time').textContent = '...';
  audio.currentTime = 0;
  audio.play();
  requestAnimationFrame(syncLights);
}
function react(){
  if(!running){
    startGame();
    return;
  }
  if(!ready){
    document.getElementById('time').textContent = 'JUMP START';
    running = false;
    audio.pause();
    return;
  }
  const t = Math.round(performance.now() - startTime);
  document.getElementById('time').textContent = t + ' ms';
  saveBest(t);
  running = false;
  audio.pause();
}
function saveBest(t){
  let best = localStorage.getItem('best');
  if(!best || t < best){
    localStorage.setItem('best', t);
    best = t;
  }
  document.getElementById('best').textContent = 'Best: ' + best + ' ms';
  let history = JSON.parse(localStorage.getItem('history')) || [];
  history.unshift(t);
  history = history.slice(0, 5);
  localStorage.setItem('history', JSON.stringify(history));
  displayHistory();
}
function displayHistory(){
  const history = JSON.parse(localStorage.getItem('history')) || [];
  const historyDiv = document.getElementById('history');
  historyDiv.innerHTML = '<div>Recent Scores:</div>' +
    history.map(t => `<div>${t} ms</div>`).join('');
}
document.body.addEventListener('click', react);
document.body.addEventListener('keydown', e=>{
  if(e.code === 'Space') react();
});
</script>
